<div class="converter-file-ui">
    <h3 class="converter-title">Upload and Convert CSV</h3>
    <div class="row">
        <div class="col-md-6">
            <form id="upload-form" hx-post="/api/convert/upload" enctype="multipart/form-data" hx-target="#upload-result" hx-swap="innerHTML">
                <div class="mb-3">
                    <label for="file-input" class="form-label">Select CSV file</label>
                    <input type="file" class="form-control" id="file-input" name="file" accept=".csv">
                </div>
                <button type="submit" class="btn btn-primary" id="upload-button">Upload and Convert</button>
            </form>
        </div>
        <div class="col-md-6">
            <div id="upload-result">
                <!-- Result will be swapped here -->
            </div>
        </div>
    </div>
</div>
