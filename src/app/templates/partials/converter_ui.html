<div class="converter-title" id="converter-title">
    {% if mode == 'chirp_to_btech' %}
    Convert CHIRP to BTECH
    {% else %}
    Convert BTECH to CHIRP
    {% endif %}
</div>

<div class="mb-3">
    <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio" name="mode" id="mode-chirp-to-btech" value="chirp_to_btech" {% if mode == 'chirp_to_btech' %}checked{% endif %} onchange="document.getElementById('conversion-direction').value = 'chirp_to_btech'">
        <label class="form-check-label" for="mode-chirp-to-btech">CHIRP to BTECH</label>
    </div>
    <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio" name="mode" id="mode-btech-to-chirp" value="btech_to_chirp" {% if mode == 'btech_to_chirp' %}checked{% endif %} onchange="document.getElementById('conversion-direction').value = 'btech_to_chirp'">
        <label class="form-check-label" for="mode-btech-to-chirp">BTECH to CHIRP</label>
    </div>
    <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio" name="mode" id="mode-clipboard" value="clipboard" {% if mode == 'clipboard' %}checked{% endif %} onchange="document.getElementById('conversion-direction').value = 'clipboard'">
        <label class="form-check-label" for="mode-clipboard">Clipboard Sharing</label>
    </div>
</div>

<div class="mb-3">
    <div class="nav nav-tabs" id="converterTabs" role="tablist">
        <button class="nav-link active" id="paste-tab" data-bs-toggle="tab" data-bs-target="#paste" type="button" role="tab">Paste Content</button>
        <button class="nav-link" id="upload-tab" data-bs-toggle="tab" data-bs-target="#upload" type="button" role="tab" hx-get="/converter-file-ui" hx-target="#upload-content">Upload File</button>
    </div>
</div>

<div class="tab-content" id="converterTabsContent">
<div class="tab-pane fade show active" id="paste" role="tabpanel" aria-labelledby="paste-tab">
    <div class="row">
        <div class="col-md-6">
            <form id="paste-form" hx-post="/api/convert/paste" hx-target="#result" hx-swap="innerHTML">
                <div class="mb-3">
                    <input type="hidden" name="direction" id="conversion-direction" value="chirp_to_btech">
                    <textarea class="form-control" name="csv_content" rows="15" placeholder="Paste your CSV content or Clipboard Sharing text here..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary w-100" id="convert-button">Convert</button>
            </form>
        </div>
        <div class="col-md-6">
            <div id="result">
                <div class="mb-3">
                    <label class="form-label">Result:</label>
                    <textarea class="form-control" rows="15" readonly placeholder="Converted content will appear here..."></textarea>
                </div>
                <div id="result-message"></div>
            </div>
        </div>
    </div>
</div>
    <div class="tab-pane fade" id="upload" role="tabpanel" aria-labelledby="upload-tab">
        <div id="upload-content">
            <!-- This content will be replaced by hx-get="/converter-file-ui" -->
        </div>
    </div>
</div>
