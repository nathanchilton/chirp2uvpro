<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHIRP to BTECH Converter</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="container">
    <header>
        <h1 class="main-title">CHIRP to BTECH Converter</h1>
    </header>

    <main>
        <section id="converter-section">
            <!-- This will be populated by the /converter-ui route -->
            <div hx-get="/converter-ui" hx-trigger="load">
                <p style="text-align: center; color: var(--text-muted);">Loading converter...</p>
            </div>
        </section>

        <section id="history-section">
            <h2 class="history-header">
                Conversion History
                <button hx-get="/api/history/fragment" hx-target="#history-list" hx-swap="innerHTML" class="history-refresh-btn">Refresh</button>
            </h2>
            <div id="history-list" hx-get="/api/history/fragment" hx-trigger="load">
                <p style="color: var(--text-muted);">Loading history...</p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Nathan Chilton</p>
    </footer>

    <script src="/static/js/main.js"></script>
</body>
</html>
