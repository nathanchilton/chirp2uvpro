services:
  chirp-converter:
    build: .
    container_name: chirp-converter
    ports:
      - "5000:5000"
    restart: unless-stopped
    volumes:
      - ./uploads:/app/uploads
    networks:
      - converter-network

  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    network_mode: "host"
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - chirp-converter
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}

networks:
  converter-network:
    driver: bridge



